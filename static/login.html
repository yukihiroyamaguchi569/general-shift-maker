<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当直表 自動作成システム - ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-4">
        <div class="card p-8">
            <div class="header-bar rounded-xl px-6 py-5 shadow-lg mb-8 text-center">
                <h1 class="text-xl font-bold text-white tracking-wide">当直表 一括作成システム</h1>
                <p class="text-sm text-blue-200 mt-1">ICU・準夜・レジデント対応</p>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
                <input
                    type="password"
                    id="password"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="パスワードを入力"
                    autofocus
                />
            </div>

            <p id="error" class="text-red-500 text-sm mb-4 hidden">パスワードが違います</p>

            <button
                id="loginBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition-colors"
            >
                ログイン
            </button>
        </div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            error.classList.add('hidden');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password }),
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                error.classList.remove('hidden');
            }
        }

        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
